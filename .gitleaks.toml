# gitleaks configuration - extend defaults, allowlist false positives.
#
# Consumed by .github/workflows/security.yml via
#   gitleaks detect --source . --config .gitleaks.toml ...
#
# Allowlisted hits below were reviewed and confirmed non-credential:
#   - frontend/src/app/api/page.tsx       - developer docs: literal curl
#     examples with placeholder tokens like "eyJ..." and "wot_abc123...".
#   - .github/workflows/release.yml       - dev fallback value for JWT_SECRET
#     used during CI test runs when secrets.JWT_SECRET is absent
#     ('test-secret-at-least-32-characters-long-xx').
#   - wiki/mcp-setup.md                   - MCP install guide. Example
#     `WOT_API_KEY=wot_a3f2c5d9...` strings show developers what a key
#     looks like; the literal `...` makes it obviously truncated and
#     not a real credential.
#   - frontend/public/llms-full.txt       - generated artifact rebuilt
#     from `wiki/*.md` by `scripts/build_llms_txt.py`. Same placeholder
#     content as the wiki sources; allowlisted so the regenerated
#     file does not need separate review on every wiki edit.
#   - wiki/api-keys.md                    - API-key user guide. Same
#     `WOT_API_KEY=wot_...` and `Authorization: Bearer wot_...`
#     placeholders as the MCP setup guide. Path may exist in current
#     tree or only in git history; the allowlist regex matches both
#     because gitleaks scans full history by default.
[extend]
useDefault = true

# Custom rules added after a Neon credential slipped through the default
# detector at commit 9cd3582 (run_mcp.sh, 2026-04-16). The default
# Postgres rule did not flag the connection string; these explicit rules
# make sure a Neon-style npg_ token or any postgres URL with an embedded
# password (other than the local docker-compose 'wotpass' placeholder)
# fails the security workflow.

[[rules]]
id = "neon-postgres-token"
description = "Neon Postgres password token (npg_*)"
regex = '''npg_[A-Za-z0-9]{8,}'''
keywords = ["npg_"]

[[rules]]
id = "postgres-url-embedded-password"
description = "Postgres connection string with embedded password"
# Negative class excludes < > so placeholder syntax like <password> does
# not match. Min length bumped to 12 because real production passwords
# are >=16 chars (Neon npg_*, AWS, GCP, JWT secrets, Stripe sk_*); the
# old 8-char floor caught the literal word "password" used as a doc
# placeholder in setup examples.
regex = '''postgres(?:ql)?://[A-Za-z0-9_-]+:[^@\s/'"<>]{12,}@'''
keywords = ["postgresql://", "postgres://"]

[allowlist]
description = "Docs placeholder tokens and CI test fallback JWT (not real secrets)"
paths = [
  '''frontend/src/app/api/page\.tsx''',
  '''\.github/workflows/release\.yml''',
  '''wiki/mcp-setup\.md''',
  '''wiki/api-keys\.md''',
  '''frontend/public/llms-full\.txt''',
]
# Allowlist the local docker-compose placeholder password that appears
# in a handful of dev-setup files. NOT a real credential; matches a
# Compose YAML default that ships with the repo.
regexes = [
  '''postgres(?:ql)?://wot:wot(pass)?@''',
]
