name: Scheduled static content refresh

# Regenerates frontend/public/llms-codes/ from the production database
# and opens a pull request when the dumps drift from what's in main.
#
# This is the safety net for the dev-side pre-push hook in .githooks/pre-push.
# The hook catches drift you cause; this catches drift caused by:
#   - bulk backfills (Track 2 LLM verification, description regen)
#   - monthly anchor ingest refresh (NAICS / ISIC / NACE)
#   - direct admin operations against the production DB
#   - a contributor pushing with --no-verify
#
# Why a PR instead of a direct push: a full regen produces ~300 MB across
# ~1,200 files. That's reviewable as a diff, but landing it on main without
# CI gating is risky. The PR flow runs ci.yml (integrity check + em-dash
# guard + frontend build) before merge, giving a natural human checkpoint.
#
# Required GitHub secrets (already configured for ingest-refresh.yml):
#   DATABASE_URL  -- read access to production DB
#
# Optional secrets:
#   REVALIDATE_SECRET, FRONTEND_URL  -- post-merge ISR bust (handled by
#       post-merge-refresh.yml when the PR lands; we do not bust here)

on:
  schedule:
    # 04:23 UTC every Monday. Runs after the monthly ingest-refresh
    # (1st of month, 03:17 UTC) so newly-ingested data is captured on
    # the next Monday's run.
    - cron: "23 4 * * 1"
  workflow_dispatch:
    inputs:
      systems:
        description: "Comma-separated system IDs to refresh (blank = all)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: static-content-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate static llms-codes
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate static content
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BUILD_STATIC_ONLY: ${{ github.event.inputs.systems }}
        run: python scripts/build_static_content.py

      - name: Verify integrity
        run: python scripts/check_static_content_integrity.py

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet -- frontend/public/llms-codes/ \
             && [ -z "$(git ls-files --others --exclude-standard -- frontend/public/llms-codes/)" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected; nothing to do."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git status --short -- frontend/public/llms-codes/ | head -30
          fi

      - name: Open pull request
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            regen(static): refresh llms-codes from production DB

            Auto-generated by .github/workflows/static-content-refresh.yml.
          branch: bot/static-content-refresh
          delete-branch: true
          title: "regen(static): refresh AEO/RAG content from production DB"
          body: |
            Automated regeneration of `frontend/public/llms-codes/` from the
            current production database state.

            This PR lands the latest descriptions, equivalences, and any
            newly-ingested classification systems into the static AEO/RAG
            text dumps that ship with the frontend.

            **Triggered by**: ${{ github.event_name }}${{ github.event.inputs.systems && format(' (systems={0})', github.event.inputs.systems) || '' }}

            **What to check before merging**:
            - The diff size matches your expectation (a fresh full regen is
              ~300 MB; a small diff means only a few systems changed).
            - CI green on this PR (integrity check, em-dash guard, frontend
              build).

            After merge, `post-merge-refresh.yml` busts the Next.js ISR cache
            and Cloud Build deploys the new container.
          add-paths: frontend/public/llms-codes/
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          labels: |
            automated
            static-content
